<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</head>
<body>

<div class="container">
    <div class="box">
        <h2>Reset Password</h2>

        {% if error %}
            <p style="color:red; text-align:center;">{{ error }}</p>
        {% endif %}

        <form method="post" onsubmit="return validateResetPassword()">

            <label>New Password</label>
            <div class="password-box">
                <input type="password" id="new_password" name="new_password">
                <span class="toggle" onclick="togglePassword('new_password')">👁</span>
            </div>

            <label>Confirm Password</label>
            <div class="password-box">
                <input type="password" id="confirm_password" name="confirm_password">
                <span class="toggle" onclick="togglePassword('confirm_password')">👁</span>
            </div>

            <button type="submit">Reset Password</button>

            <p style="margin-top:15px;">
                Want to login?
                <a href="{{ url_for('login_page') }}">Click here</a>
            </p>
        </form>
    </div>
</div>

</body>
</html>
